name: rft-multi-grader-cli-demo
description: Template to demonstrate reinforcement fine-tuning with multi grader via CLI
model: o4-mini-2025-04-16
method:
  type: reinforcement
  reinforcement:
    hyperparameters:
      epochs: 3
      batch_size: 8
      learning_rate_multiplier: 1.0
      beta: 0.5
      compute_multiplier: 1.0
      reasoning_effort: high
    grader:
      type: multi
      name: strict_partial_credit
      graders:
        exact:
          type: string_check
          name: exact
          operation: eq
          input: "{{sample.output_text}}"
          reference: "{{item.reference_answer}}"
        fuzzy:
          type: text_similarity
          name: fuzzy
          evaluation_metric: fuzzy_match
          input: "{{sample.output_text}}"
          reference: "{{item.reference_answer}}"
      calculate_output: "0.9 * exact + 0.1 * fuzzy"
suffix: "rft-multi-trained"
seed: 42
training_file: local:../data/medmcq_training.jsonl
validation_file: local:../data/medmcq_validation.jsonl
